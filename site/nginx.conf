limit_req_zone $binary_remote_addr zone=site_per_ip:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login_per_ip:10m rate=3r/m;
limit_conn_zone $binary_remote_addr zone=connections_per_ip:10m;

upstream tumingjiang_auth {
    server tumingjiang-auth:3000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 82.157.65.90;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        auth_request off;
        root /var/www/acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name 82.157.65.90;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/82.157.65.90/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/82.157.65.90/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:TJSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 16k;
    keepalive_timeout 30;
    limit_conn connections_per_ip 24;
    limit_req zone=site_per_ip burst=80 nodelay;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types application/javascript application/wasm application/octet-stream text/css application/json;

    auth_request /_auth_check;
    error_page 401 = @login_redirect;

    add_header Strict-Transport-Security "max-age=2592000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' blob: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' 'sha256-jiXhnJIgdqxDRkLPs6wTf9BPWi8mf11/cFF5Am48sso=' 'sha256-90XB5rygOYdDI2xXax7up2ApJar5isv+bqoF07UmFEs='; connect-src 'self'; worker-src 'self' blob:; child-src 'self' blob:; font-src 'self' data:;" always;

    location = /_auth_check {
        internal;
        auth_request off;
        proxy_pass http://tumingjiang_auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location = /_auth_owner {
        internal;
        auth_request off;
        proxy_pass http://tumingjiang_auth/check-owner;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location = /api/access/login {
        auth_request off;
        limit_req zone=login_per_ip burst=2 nodelay;
        proxy_pass http://tumingjiang_auth/api/access/login;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location ^~ /api/access/ {
        auth_request off;
        proxy_pass http://tumingjiang_auth;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location = /api/downloads {
        auth_request off;
        client_max_body_size 30m;
        proxy_request_buffering off;
        proxy_send_timeout 180s;
        proxy_read_timeout 30s;
        proxy_pass http://tumingjiang_auth/api/downloads;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location ^~ /api/ai/ {
        auth_request /_auth_owner;
        error_page 401 403 = @owner_login_redirect;
        client_max_body_size 12m;
        proxy_request_buffering off;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_pass http://tumingjiang_auth;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location ~ "^/d/[A-Za-z0-9_-]{32}$" {
        auth_request off;
        proxy_buffering off;
        proxy_read_timeout 180s;
        proxy_pass http://tumingjiang_auth;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location = /access/manage.html {
        auth_request /_auth_owner;
        error_page 401 403 = @owner_login_redirect;
        try_files $uri =404;
        expires -1;
    }

    location ^~ /assistant/ {
        auth_request /_auth_owner;
        error_page 401 403 = @owner_login_redirect;
        try_files $uri $uri/ /assistant/index.html;
        expires -1;
    }

    location ^~ /access/ {
        auth_request off;
        try_files $uri $uri/ /access/index.html;
        expires -1;
    }

    location @login_redirect {
        auth_request off;
        return 302 /access/?next=$request_uri;
    }

    location @owner_login_redirect {
        auth_request off;
        return 302 /access/?next=$request_uri&owner=1;
    }

    location ~* \.(?:conf|map|log|secret)$ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    location ~* \.mjs$ {
        default_type application/javascript;
        try_files $uri =404;
        expires 1h;
    }

    location ~* \.wasm$ {
        default_type application/wasm;
        try_files $uri =404;
        expires 30d;
    }

    location ~* \.tflite$ {
        default_type application/octet-stream;
        try_files $uri =404;
        expires 30d;
    }

    location ~* \.traineddata\.gz$ {
        gzip off;
        default_type application/gzip;
        try_files $uri =404;
        expires 30d;
    }

    location ~* \.(?:js|css|png|jpe?g|webp|gif|svg|ico)$ {
        try_files $uri =404;
        expires 1h;
    }
}
