limit_req_zone $binary_remote_addr zone=site_per_ip:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login_per_ip:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=connections_per_ip:10m;

upstream tumingjiang_auth {
    server tumingjiang-auth:3000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 82.157.65.90;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 16k;
    keepalive_timeout 30;
    limit_conn connections_per_ip 24;
    limit_req zone=site_per_ip burst=80 nodelay;

    auth_request /_auth_check;
    error_page 401 = @login_redirect;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(), payment=()" always;

    location ^~ /.well-known/acme-challenge/ {
        auth_request off;
        root /var/www/acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location = /_auth_check {
        internal;
        auth_request off;
        proxy_pass http://tumingjiang_auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location = /_auth_owner {
        internal;
        auth_request off;
        proxy_pass http://tumingjiang_auth/check-owner;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location = /api/access/login {
        auth_request off;
        limit_req zone=login_per_ip burst=3 nodelay;
        proxy_pass http://tumingjiang_auth/api/access/login;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location ^~ /api/access/ {
        auth_request off;
        proxy_pass http://tumingjiang_auth;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location ^~ /api/ai/ {
        auth_request /_auth_owner;
        error_page 401 403 = @owner_required;
        client_max_body_size 12m;
        proxy_request_buffering off;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_pass http://tumingjiang_auth;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location = /access/manage.html {
        auth_request /_auth_owner;
        error_page 403 = @owner_required;
        try_files $uri =404;
        expires -1;
    }

    location ^~ /access/ {
        auth_request off;
        try_files $uri $uri/ /access/index.html;
        expires -1;
    }

    location @login_redirect {
        auth_request off;
        return 302 /access/?next=$request_uri;
    }

    location @owner_required {
        auth_request off;
        return 302 /;
    }

    location ~* \.(?:conf|map|log|secret)$ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    location ~* \.mjs$ {
        default_type application/javascript;
        try_files $uri =404;
        expires 1h;
    }

    location ~* \.wasm$ {
        default_type application/wasm;
        try_files $uri =404;
        expires 30d;
    }

    location ~* \.tflite$ {
        default_type application/octet-stream;
        try_files $uri =404;
        expires 30d;
    }

    location ~* \.traineddata\.gz$ {
        gzip off;
        default_type application/gzip;
        try_files $uri =404;
        expires 30d;
    }

    location ~* \.(?:js|css|png|jpe?g|webp|gif|svg|ico)$ {
        try_files $uri =404;
        expires 1h;
    }
}
