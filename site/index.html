<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="description" content="在浏览器本地为图片批量命名并打包下载，图片不会上传服务器。">
  <meta name="theme-color" content="#f7f4ec">
  <title>图名匠｜图片批量命名工具</title>
  <style>
    :root{--paper:#f7f4ec;--ink:#17211b;--muted:#667068;--line:#d7d8ce;--card:#fffefa;--green:#245b45;--green2:#183e31;--orange:#ef7b45;--red:#b53b3b;--shadow:0 18px 55px rgba(28,45,35,.1)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);background:radial-gradient(circle at 8% 4%,rgba(239,123,69,.12),transparent 24rem),radial-gradient(circle at 90% 12%,rgba(36,91,69,.12),transparent 28rem),var(--paper);font-family:"Microsoft YaHei","PingFang SC",system-ui,-apple-system,sans-serif;min-height:100vh}
    button,input{font:inherit}button{cursor:pointer}.shell{width:min(1160px,calc(100% - 32px));margin:auto;padding:28px 0 70px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:42px}.brand{display:flex;align-items:center;gap:11px;font-weight:850;letter-spacing:.04em}.mark{width:38px;height:38px;border-radius:12px;background:var(--green);display:grid;place-items:center;color:#fff;box-shadow:inset -8px -8px 0 rgba(0,0,0,.08)}.mark:after{content:"名";font-size:18px}.privacy{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:13px}.privacy:before{content:"";width:8px;height:8px;border-radius:50%;background:#45a66e;box-shadow:0 0 0 4px rgba(69,166,110,.12)}
    .hero{display:grid;grid-template-columns:1.05fr .95fr;align-items:center;gap:42px;margin-bottom:44px}.eyebrow{color:var(--green);font-weight:800;font-size:13px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}.hero h1{font-size:clamp(38px,6vw,70px);line-height:1.06;letter-spacing:-.055em;margin:0 0 18px;max-width:720px}.hero h1 em{font-style:normal;color:var(--orange)}.hero p{font-size:clamp(16px,2vw,19px);line-height:1.75;color:var(--muted);margin:0;max-width:650px}.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.step{background:rgba(255,254,250,.72);border:1px solid var(--line);border-radius:18px;padding:17px 15px;min-height:112px}.step b{display:block;color:var(--orange);font-size:12px;margin-bottom:20px}.step span{font-weight:800;line-height:1.45}
    .workspace{background:rgba(255,254,250,.88);border:1px solid rgba(105,117,108,.25);border-radius:28px;padding:clamp(18px,3vw,32px);box-shadow:var(--shadow);backdrop-filter:blur(12px)}.drop{position:relative;border:1.5px dashed #99a49b;border-radius:22px;min-height:190px;display:grid;place-items:center;text-align:center;padding:26px;transition:.2s;background:rgba(247,244,236,.6)}.drop.drag{border-color:var(--orange);background:rgba(239,123,69,.08);transform:scale(1.005)}.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}.drop-icon{width:52px;height:52px;border-radius:17px;margin:0 auto 13px;background:var(--green);color:#fff;display:grid;place-items:center;font-size:27px}.drop h2{font-size:20px;margin:0 0 8px}.drop p{margin:0;color:var(--muted);font-size:14px;line-height:1.6}.drop strong{color:var(--green)}
    .tools{display:none;align-items:end;gap:12px;flex-wrap:wrap;margin:24px 0 17px}.tools.show{display:flex}.field{display:grid;gap:7px}.field label{font-size:12px;color:var(--muted);font-weight:700}.field input{height:43px;border:1px solid var(--line);border-radius:12px;background:white;padding:0 13px;outline:none;min-width:220px}.field input:focus,.namebox input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(36,91,69,.1)}.smallbtn{height:43px;border:1px solid var(--line);background:#fff;border-radius:12px;padding:0 16px;font-weight:750;color:var(--ink)}.smallbtn:hover{border-color:#9ca69e}.clear{margin-left:auto;color:var(--red)}
    .summary{display:none;align-items:center;justify-content:space-between;gap:12px;margin:10px 2px 14px}.summary.show{display:flex}.count{font-weight:800}.status{font-size:13px;color:var(--muted)}.status.bad{color:var(--red);font-weight:700}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{display:grid;grid-template-columns:126px 1fr;gap:16px;padding:13px;border:1px solid var(--line);border-radius:18px;background:var(--card);position:relative}.thumb{width:126px;aspect-ratio:1.1;border-radius:12px;overflow:hidden;background:#e9e9e3}.thumb img{width:100%;height:100%;object-fit:cover;display:block}.meta{min-width:0;display:flex;flex-direction:column;justify-content:center}.original{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:9px;padding-right:24px}.namebox{display:flex;align-items:center;border:1px solid var(--line);border-radius:12px;background:#fff;overflow:hidden;transition:.15s}.namebox.invalid{border-color:var(--red);box-shadow:0 0 0 3px rgba(181,59,59,.08)}.namebox input{border:0;outline:0;min-width:0;width:100%;height:42px;padding:0 10px;background:transparent}.ext{padding:0 10px;color:var(--muted);font-size:13px;border-left:1px solid var(--line)}.error{min-height:17px;color:var(--red);font-size:11px;margin-top:5px}.remove{position:absolute;top:9px;right:9px;width:29px;height:29px;border:0;border-radius:9px;background:rgba(23,33,27,.72);color:#fff;font-size:17px;line-height:1}.remove:hover{background:var(--red)}
    .footerbar{display:none;position:sticky;bottom:14px;z-index:5;margin-top:22px;padding:12px 12px 12px 17px;border:1px solid rgba(36,91,69,.18);background:rgba(255,254,250,.94);backdrop-filter:blur(14px);border-radius:18px;box-shadow:0 14px 40px rgba(25,48,36,.16);align-items:center;justify-content:space-between;gap:16px}.footerbar.show{display:flex}.readytext{font-size:13px;color:var(--muted)}.readytext b{display:block;color:var(--ink);font-size:15px;margin-bottom:2px}.download{border:0;border-radius:13px;background:var(--green);color:#fff;min-height:48px;padding:0 23px;font-weight:850;box-shadow:inset 0 -3px 0 rgba(0,0,0,.13);transition:.15s}.download:hover{background:var(--green2);transform:translateY(-1px)}.download:disabled{opacity:.45;cursor:not-allowed;transform:none}.note{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:#17211b;color:white;padding:11px 17px;border-radius:12px;font-size:13px;z-index:20;transition:.25s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:800px){.shell{width:min(100% - 22px,680px);padding-top:18px}.topbar{margin-bottom:28px}.privacy{font-size:11px}.hero{grid-template-columns:1fr;gap:25px}.steps{gap:7px}.step{min-height:96px;padding:13px 11px}.step b{margin-bottom:12px}.workspace{border-radius:22px;padding:14px}.grid{grid-template-columns:1fr}.tools{align-items:stretch}.field{width:100%}.field input{width:100%}.clear{margin-left:0}.card{grid-template-columns:96px 1fr;gap:12px}.thumb{width:96px}.footerbar{bottom:9px}.readytext{display:none}.download{width:100%}}
    @media(max-width:430px){.hero h1{font-size:42px}.steps{grid-template-columns:1fr}.step{min-height:auto;display:flex;align-items:center;gap:12px}.step b{margin:0}.drop{min-height:168px}.card{grid-template-columns:78px 1fr}.thumb{width:78px}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar"><div class="brand"><span class="mark"></span><span>图名匠</span></div><div class="privacy">图片仅在你的设备中处理</div></header>
    <section class="hero">
      <div><div class="eyebrow">Rename images, simply</div><h1>给每张图片一个<br><em>好名字。</em></h1><p>一次放入多张图片，逐张填写名称，再一键带走。保留原格式，不压缩画质，也不会把图片上传到服务器。</p></div>
      <div class="steps"><div class="step"><b>01</b><span>选择<br>图片</span></div><div class="step"><b>02</b><span>填写<br>名称</span></div><div class="step"><b>03</b><span>打包<br>下载</span></div></div>
    </section>
    <section class="workspace" aria-label="图片命名工作区">
      <div class="drop" id="drop"><input id="picker" type="file" accept="image/*" multiple aria-label="选择图片"><div><div class="drop-icon">＋</div><h2>把图片拖到这里</h2><p>或者<strong>点击选择图片</strong> · 支持一次选择多张</p></div></div>
      <div class="tools" id="tools"><div class="field"><label for="prefix">快速批量命名（可选）</label><input id="prefix" placeholder="例如：旅行照片"></div><button class="smallbtn" id="applyPrefix">应用序号</button><button class="smallbtn clear" id="clearAll">清空全部</button></div>
      <div class="summary" id="summary"><div class="count" id="count"></div><div class="status" id="status"></div></div>
      <div class="grid" id="grid"></div>
      <div class="footerbar" id="footerbar"><div class="readytext"><b>名称检查完成后即可下载</b><span>下载为一个 ZIP 压缩包</span></div><button class="download" id="download">打包下载</button></div>
      <p class="note">提示：会自动保留 JPG、PNG、WEBP 等原图片格式。</p>
    </section>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
    const picker=document.querySelector('#picker'),drop=document.querySelector('#drop'),grid=document.querySelector('#grid'),tools=document.querySelector('#tools'),summary=document.querySelector('#summary'),footerbar=document.querySelector('#footerbar'),count=document.querySelector('#count'),statusEl=document.querySelector('#status'),downloadBtn=document.querySelector('#download'),toast=document.querySelector('#toast');
    let items=[];let toastTimer;const mimeExt={'image/jpeg':'jpg','image/png':'png','image/webp':'webp','image/gif':'gif','image/bmp':'bmp','image/avif':'avif','image/heic':'heic','image/heif':'heif','image/tiff':'tif','image/svg+xml':'svg'};
    const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    function flash(text){toast.textContent=text;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),2200)}
    function parts(file){const dot=file.name.lastIndexOf('.');const raw=dot>0?file.name.slice(0,dot):file.name;const ext=(dot>0?file.name.slice(dot+1):mimeExt[file.type]||'img').toLowerCase().replace(/[^a-z0-9]/g,'')||'img';return{raw,ext}}
    function cleanName(value){return value.replace(/[<>:"/\\|?*\u0000-\u001f]/g,'-').replace(/[. ]+$/g,'').trim().slice(0,180)}
    function addFiles(files){const all=[...files],images=all.filter(f=>f.type.startsWith('image/'));const rejected=all.length-images.length;if(rejected)flash(`已忽略 ${rejected} 个非图片文件`);for(const file of images){const p=parts(file);items.push({id:crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random(),file,url:URL.createObjectURL(file),name:p.raw,ext:p.ext,error:''})}render();if(images.length)flash(`已添加 ${images.length} 张图片`)}
    function validate(){const seen=new Map();for(const item of items){item.name=cleanName(item.name);item.error=item.name?'':'请输入图片名称';if(item.name){const key=(item.name+'.'+item.ext).toLocaleLowerCase();if(seen.has(key)){item.error='名称重复，请修改';seen.get(key).error='名称重复，请修改'}else seen.set(key,item)}}const bad=items.filter(x=>x.error).length;statusEl.textContent=bad?`${bad} 张需要修改`:'所有名称都可以使用';statusEl.classList.toggle('bad',!!bad);downloadBtn.disabled=!items.length||!!bad;return !bad&&items.length>0}
    function render(){const has=items.length>0;tools.classList.toggle('show',has);summary.classList.toggle('show',has);footerbar.classList.toggle('show',has);count.textContent=`已选择 ${items.length} 张图片`;grid.innerHTML=items.map((item,i)=>`<article class="card" data-id="${item.id}"><button class="remove" data-remove title="移除这张图片" aria-label="移除第 ${i+1} 张图片">×</button><div class="thumb"><img src="${item.url}" alt="第 ${i+1} 张图片预览"></div><div class="meta"><div class="original" title="${esc(item.file.name)}">原文件：${esc(item.file.name)}</div><div class="namebox ${item.error?'invalid':''}"><input data-name value="${esc(item.name)}" aria-label="第 ${i+1} 张图片的新名称"><span class="ext">.${esc(item.ext)}</span></div><div class="error">${esc(item.error||'')}</div></div></article>`).join('');validate();document.querySelectorAll('[data-name]').forEach(input=>{input.addEventListener('input',e=>{const id=e.target.closest('.card').dataset.id;const item=items.find(x=>x.id===id);item.name=e.target.value;validate();syncErrors()});input.addEventListener('blur',e=>{e.target.value=cleanName(e.target.value);const item=items.find(x=>x.id===e.target.closest('.card').dataset.id);item.name=e.target.value;validate();syncErrors()})});document.querySelectorAll('[data-remove]').forEach(btn=>btn.addEventListener('click',()=>remove(btn.closest('.card').dataset.id)))}
    function syncErrors(){document.querySelectorAll('.card').forEach(card=>{const item=items.find(x=>x.id===card.dataset.id);card.querySelector('.namebox').classList.toggle('invalid',!!item.error);card.querySelector('.error').textContent=item.error})}
    function remove(id){const item=items.find(x=>x.id===id);if(item)URL.revokeObjectURL(item.url);items=items.filter(x=>x.id!==id);render()}
    picker.addEventListener('change',e=>{addFiles(e.target.files);picker.value=''});['dragenter','dragover'].forEach(type=>drop.addEventListener(type,e=>{e.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(type=>drop.addEventListener(type,e=>{e.preventDefault();drop.classList.remove('drag')}));drop.addEventListener('drop',e=>addFiles(e.dataTransfer.files));
    document.querySelector('#clearAll').addEventListener('click',()=>{items.forEach(x=>URL.revokeObjectURL(x.url));items=[];render();flash('已清空')});document.querySelector('#applyPrefix').addEventListener('click',()=>{const prefix=cleanName(document.querySelector('#prefix').value);if(!prefix){flash('请先填写批量名称');return}const width=Math.max(2,String(items.length).length);items.forEach((x,i)=>x.name=`${prefix}-${String(i+1).padStart(width,'0')}`);render();flash('已应用批量名称')});
    const crcTable=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?0xedb88320^(c>>>1):c>>>1;t[n]=c>>>0}return t})();
    function crc32(data){let c=0xffffffff;for(const b of data)c=crcTable[(c^b)&255]^(c>>>8);return(c^0xffffffff)>>>0}function u16(v){return new Uint8Array([v&255,(v>>>8)&255])}function u32(v){return new Uint8Array([v&255,(v>>>8)&255,(v>>>16)&255,(v>>>24)&255])}function join(chunks){const size=chunks.reduce((n,x)=>n+x.length,0),out=new Uint8Array(size);let p=0;for(const x of chunks){out.set(x,p);p+=x.length}return out}
    async function makeZip(entries){const enc=new TextEncoder(),locals=[],centers=[];let offset=0;for(const entry of entries){const name=enc.encode(entry.name),data=new Uint8Array(await entry.file.arrayBuffer()),crc=crc32(data);const local=join([u32(0x04034b50),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),name,data]);locals.push(local);const center=join([u32(0x02014b50),u16(20),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset),name]);centers.push(center);offset+=local.length}const centralSize=centers.reduce((n,x)=>n+x.length,0);return new Blob([...locals,...centers,join([u32(0x06054b50),u16(0),u16(0),u16(entries.length),u16(entries.length),u32(centralSize),u32(offset),u16(0)])],{type:'application/zip'})}
    downloadBtn.addEventListener('click',async()=>{if(!validate()){syncErrors();flash('请先修改标红的名称');return}downloadBtn.disabled=true;downloadBtn.textContent='正在打包…';try{const zip=await makeZip(items.map(x=>({file:x.file,name:`${cleanName(x.name)}.${x.ext}`})));const a=document.createElement('a');a.href=URL.createObjectURL(zip);a.download=`已命名图片-${new Date().toISOString().slice(0,10)}.zip`;document.body.appendChild(a);a.click();a.remove();const url=a.href;setTimeout(()=>URL.revokeObjectURL(url),30000);flash('打包完成，正在下载')}catch(e){console.error(e);flash('打包失败，请减少图片后重试')}finally{downloadBtn.textContent='打包下载';validate()}});
    window.addEventListener('beforeunload',()=>items.forEach(x=>URL.revokeObjectURL(x.url)));
  </script>
</body>
</html>
